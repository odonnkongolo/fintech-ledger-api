# 1. The Deployment: Tells the EKS nodes how to run your Docker container

apiVersion: apps/v1
kind: Deployment
metadata:
  name: fintech-ledger-app
spec:
  replicas: 2 # Runs two copies of your app simultaneously for High Availability
  selector:
    matchLabels:
      app: fintech-ledger
  template:
    metadata:
      labels:
        app: fintech-ledger
    spec:
      containers:
      - name: fintech-ledger
        # Points directly to the ECR registry we built earlier
        image: 084000526807.dkr.ecr.eu-west-1.amazonaws.com/fintech-ledger-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 7777
        livenessProbe:
          httpGet:
            path: /transaction-status
            port: 7777
          initialDelaySeconds: 15
          periodSeconds: 10
        securityContext:
          runAsUser: 1000
          readOnlyRootFilesystem: true
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"

---
# 2. The Service: Commands AWS to build a Load Balancer so the public can reach the app

apiVersion: v1
kind: Service
metadata:
  name: fintech-ledger-service
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb" # Provisions a blazing-fast AWS Network Load Balancer
spec:
  selector:
    app: fintech-ledger
  ports:
    - protocol: TCP
      port: 80
      targetPort: 7777
  type: LoadBalancer